<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .bg { position: fixed; inset: 0; overflow: hidden; }
    .bg-circle { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
    .c1 { width: 600px; height: 600px; background: #1a6fd4; top: -200px; right: -200px; animation: float1 8s ease-in-out infinite; }
    .c2 { width: 400px; height: 400px; background: #4db8ff; bottom: -100px; left: -100px; animation: float2 10s ease-in-out infinite; }
    .c3 { width: 300px; height: 300px; background: #0a3d7a; top: 50%; left: 40%; animation: float3 12s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-20px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
    .tool { position: absolute; font-size: 36px; opacity: 0.05; animation: floatTool 15s ease-in-out infinite; }
    .t1 { top: 15%; left: 8%; }
    .t2 { top: 70%; right: 8%; animation-delay: 3s; }
    .t3 { top: 40%; left: 5%; animation-delay: 6s; }
    .t4 { bottom: 15%; left: 40%; animation-delay: 9s; }
    @keyframes floatTool { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(10deg)} }
    .content { position: relative; z-index: 5; text-align: center; animation: fadeInUp 1s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .logo-box { width: 110px; height: 110px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 52px; margin: 0 auto 30px; box-shadow: 0 20px 60px rgba(26,111,212,0.5); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 20px 60px rgba(26,111,212,0.5)} 50%{box-shadow:0 25px 80px rgba(26,111,212,0.7)} }
    .logo-text { font-size: 48px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
    .logo-text span { color: #4db8ff; }
    .divider { width: 60px; height: 3px; background: linear-gradient(to right, #1a6fd4, #4db8ff); border-radius: 2px; margin: 15px auto 20px; animation: expandW 1s ease 0.5s forwards; transform: scaleX(0); }
    @keyframes expandW { from{transform:scaleX(0)} to{transform:scaleX(1)} }
    .tagline { font-size: 17px; color: #7a9abf; letter-spacing: 1px; margin-bottom: 50px; }
    .dots { display: flex; gap: 10px; justify-content: center; animation: fadeIn 1s ease 1s forwards; opacity: 0; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .dot { width: 10px; height: 10px; background: #1a6fd4; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #2a85e8; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #4db8ff; }
    @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.6} 50%{transform:translateY(-12px);opacity:1} }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="tool t1">🔧</div>
    <div class="tool t2">⚙️</div>
    <div class="tool t3">🔩</div>
    <div class="tool t4">🛠️</div>
  </div>
  <div class="content">
    <div class="logo-box">🔧</div>
    <div class="logo-text">Fix<span>NEURO</span></div>
    <div class="divider"></div>
    <div class="tagline">شخّص أعطال سيارتك بذكاء</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    setTimeout(() => window.location.href = 'login.html', 3000)
  </script>
</body>
</html>
