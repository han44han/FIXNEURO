<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - إضافة سيارة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #0d1f3c; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo span { font-size: 22px; font-weight: bold; }
    .logo span em { color: #4db8ff; font-style: normal; }
    .logo-icon { background: #1a6fd4; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .nav-links { display: flex; align-items: center; gap: 15px; }
    .nav-links a { color: white; text-decoration: none; font-size: 14px; }
    .container { flex: 1; padding: 40px 20px; max-width: 600px; margin: 0 auto; width: 100%; }
    .page-title { text-align: center; margin-bottom: 30px; }
    .page-title .icon { font-size: 50px; margin-bottom: 10px; }
    .page-title h2 { font-size: 28px; margin-bottom: 8px; }
    .page-title p { color: #aac4e0; font-size: 15px; }
    .card { background: #0d1f3c; border-radius: 20px; padding: 30px; border: 1px solid #1a3a6b; margin-bottom: 20px; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 16px; font-weight: bold; }
    .card-header span { font-size: 22px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #aac4e0; }
    .form-group input, .form-group select { width: 100%; padding: 12px 15px; background: #162d52; border: 1px solid #1a3a6b; border-radius: 10px; color: white; font-size: 15px; outline: none; }
    .form-group select option { background: #162d52; }
    .form-group input:focus, .form-group select:focus { border-color: #1a6fd4; }
    .form-group input::placeholder { color: #5a7a9a; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .fuel-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fuel-btn { padding: 12px; background: #162d52; border: 2px solid #1a3a6b; border-radius: 10px; color: white; cursor: pointer; text-align: center; font-size: 14px; }
    .fuel-btn.active { border-color: #1a6fd4; background: rgba(26,111,212,0.2); }
    .fuel-btn:hover { border-color: #1a6fd4; }
    .btn-save { width: 100%; padding: 15px; background: #1a6fd4; color: white; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-save:hover { background: #1558a8; }
    .message { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; display: none; }
    .message.error { background: rgba(255,50,50,0.2); border: 1px solid #ff3232; color: #ff8080; }
    .message.success { background: rgba(50,255,100,0.2); border: 1px solid #32ff64; color: #80ff80; }
    footer { background: #0d1f3c; padding: 15px; text-align: center; color: #aac4e0; font-size: 13px; border-top: 1px solid #1a3a6b; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <span>Fix<em>NEURO</em></span>
    </div>
    <div class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="dia.html">تشخيص</a>
      <a href="map.html">الورش</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">
      <div class="icon">🚗</div>
      <h2>إضافة سيارة</h2>
      <p>أضف بيانات سيارتك لتتمكن من تشخيص أعطالها</p>
    </div>

    <div class="message" id="message"></div>

    <div class="card">
      <div class="card-header"><span>🚙</span> بيانات السيارة</div>

      <div class="form-group">
        <label>الماركة</label>
        <select id="brand">
          <option value="">اختر الماركة</option>
          <option>تويوتا</option>
          <option>هوندا</option>
          <option>نيسان</option>
          <option>هيونداي</option>
          <option>كيا</option>
          <option>فورد</option>
          <option>شيفروليه</option>
          <option>BMW</option>
          <option>مرسيدس</option>
          <option>أودي</option>
          <option>لكزس</option>
          <option>إنفينيتي</option>
          <option>جيب</option>
          <option>لاند روفر</option>
          <option>فولكس واجن</option>
          <option>بورشه</option>
          <option>مازدا</option>
          <option>سوبارو</option>
          <option>ميتسوبيشي</option>
        </select>
      </div>

      <div class="form-group">
        <label>الموديل</label>
        <input type="text" id="model" placeholder="مثال: كامري" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>سنة الصنع</label>
          <input type="number" id="year" placeholder="مثال: 2020" min="1990" max="2025" />
        </div>
        <div class="form-group">
          <label>رقم اللوحة</label>
          <input type="text" id="plate" placeholder="مثال: أ ب ج 1234" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>اللون</label>
          <input type="text" id="color" placeholder="مثال: أبيض" />
        </div>
        <div class="form-group">
          <label>عداد الكيلومترات</label>
          <input type="number" id="mileage" placeholder="مثال: 50000" />
        </div>
      </div>

      <div class="form-group">
        <label>نوع الوقود</label>
        <div class="fuel-options">
          <div class="fuel-btn active" onclick="selectFuel(this, 'بنزين')">⛽ بنزين</div>
          <div class="fuel-btn" onclick="selectFuel(this, 'ديزل')">🛢️ ديزل</div>
          <div class="fuel-btn" onclick="selectFuel(this, 'كهربائي')">⚡ كهربائي</div>
          <div class="fuel-btn" onclick="selectFuel(this, 'هجين')">🔋 هجين</div>
        </div>
      </div>
    </div>
<div style="width: 100%; height: 400px; background: #0d1f3c; border-radius: 15px; margin: 20px 0;">
    <model-viewer 
        src="car3D.glb" 
        alt="Car Preview" 
        auto-rotate 
        camera-controls 
        style="width: 100%; height: 100%;">
    </model-viewer>
</div>
    <button class="btn-save" onclick="saveCar()">💾 حفظ السيارة</button>
  </div>

  <footer>
    <p>© 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p>
  </footer>

  <script type="module">
    import { supabase } from './database.js'

    let selectedFuel = 'بنزين'

    window.selectFuel = function(el, fuel) {
      document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'))
      el.classList.add('active')
      selectedFuel = fuel
    }

    window.saveCar = async function() {
      const msg = document.getElementById('message')
      const brand = document.getElementById('brand').value
      const model = document.getElementById('model').value
      const year = document.getElementById('year').value
      const plate = document.getElementById('plate').value
      const color = document.getElementById('color').value
      const mileage = document.getElementById('mileage').value

      if (!brand || !model || !year) {
        msg.style.display = 'block'
        msg.className = 'message error'
        msg.innerText = 'يرجى تعبئة الماركة والموديل وسنة الصنع على الأقل'
        return
      }

      const { data: { user } } = await supabase.auth.getUser()

      if (!user) {
        msg.style.display = 'block'
        msg.className = 'message error'
        msg.innerText = 'يجب تسجيل الدخول أولاً'
        setTimeout(() => window.location.href = 'login.html', 1500)
        return
      }

      const { error } = await supabase.from('cars').insert({
        user_id: user.id,
        brand,
        model,
        year: parseInt(year),
        plate_number: plate,
        color,
        mileage: mileage ? parseInt(mileage) : null,
        fuel_type: selectedFuel
      })

      if (error) {
        msg.style.display = 'block'
        msg.className = 'message error'
        msg.innerText = 'حدث خطأ في الحفظ'
      } else {
        msg.style.display = 'block'
        msg.className = 'message success'
        msg.innerText = 'تم حفظ السيارة بنجاح! ✅'
        setTimeout(() => window.location.href = 'index.html', 1500)
      }
    }
  </script>
</body>
</html>
