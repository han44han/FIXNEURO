<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - إعادة تعيين كلمة المرور</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
    .bg-c { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
    .c1 { width: 500px; height: 500px; background: #1a6fd4; top: -150px; right: -150px; }
    .c2 { width: 350px; height: 350px; background: #4db8ff; bottom: -100px; left: -100px; }
    nav { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 20px; font-weight: 800; color: white; }
    .logo-text span { color: #4db8ff; }
    .container { position: relative; z-index: 5; flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: rgba(13,31,60,0.8); backdrop-filter: blur(30px); border-radius: 24px; padding: 45px 40px; width: 100%; max-width: 440px; border: 1px solid rgba(77,184,255,0.15); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
    .card-header { text-align: center; margin-bottom: 35px; }
    .card-icon { width: 75px; height: 75px; background: linear-gradient(135deg, rgba(26,111,212,0.4), rgba(77,184,255,0.3)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 34px; margin: 0 auto 20px; border: 1px solid rgba(77,184,255,0.3); box-shadow: 0 8px 25px rgba(26,111,212,0.3); }
    .card-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .card-header p { color: #7a9abf; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #aac4e0; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #7a9abf; pointer-events: none; display: flex; }
    .toggle-pass { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #7a9abf; display: flex; align-items: center; padding: 0; transition: color 0.2s; }
    .toggle-pass:hover { color: #4db8ff; }
    .form-group input { width: 100%; padding: 13px 42px; background: rgba(10,25,50,0.6); border: 1.5px solid rgba(77,184,255,0.1); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: all 0.3s; }
    .form-group input:focus { border-color: #1a6fd4; background: rgba(10,25,50,0.9); }
    .form-group input::placeholder { color: #2d4a6a; }
    .hint { font-size: 11px; color: #7a9abf; margin-top: 5px; }
    .field-error { font-size: 12px; color: #ff8080; margin-top: 6px; display: none; background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.2); padding: 7px 10px; border-radius: 8px; }
    .btn-reset { width: 100%; padding: 15px; background: linear-gradient(135deg, #1a6fd4, #1558a8); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.3s; box-shadow: 0 8px 25px rgba(26,111,212,0.3); }
    .btn-reset:hover { transform: translateY(-1px); box-shadow: 0 12px 35px rgba(26,111,212,0.5); }
    .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .message { padding: 13px 16px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 14px; display: none; }
    .message.error { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff8080; }
    .message.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #50c864; }
    .error-state { text-align: center; padding: 20px; }
    .error-state p { color: #ff8080; margin-bottom: 15px; }
    .error-state a { color: #4db8ff; text-decoration: none; }
    footer { position: relative; z-index: 5; background: rgba(5,13,26,0.8); padding: 18px; text-align: center; color: #3d5a7a; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.03); }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-c c1"></div>
    <div class="bg-c c2"></div>
  </div>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Fix<span>NEURO</span></div>
    </a>
  </nav>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">🔑</div>
        <h2>إعادة تعيين كلمة المرور</h2>
        <p>أدخل كلمة مرور جديدة لحسابك</p>
      </div>
      <div class="message" id="message"></div>
      <div id="formSection">
        <div class="form-group">
          <label>كلمة المرور الجديدة</label>
          <div class="input-wrapper">
            <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="password" placeholder="••••••••" />
            <button class="toggle-pass" id="tp1" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="hint">حروف وأرقام، 8 أحرف على الأقل</div>
          <div class="field-error" id="passError"></div>
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <div class="input-wrapper">
            <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="confirm" placeholder="••••••••" />
            <button class="toggle-pass" id="tp2" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="confirmError"></div>
        </div>
        <button class="btn-reset" id="resetBtn">حفظ كلمة المرور الجديدة</button>
      </div>
    </div>
  </div>
  <footer><p>©️ 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p></footer>
  <script type="module">
    import { supabase } from './database.js'

    const eyeOpen = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    const eyeClosed = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`

    function togglePass(inputId, btnId) {
      const input = document.getElementById(inputId)
      const btn = document.getElementById(btnId)
      if (input.type === 'password') { input.type = 'text'; btn.innerHTML = eyeClosed }
      else { input.type = 'password'; btn.innerHTML = eyeOpen }
    }

    document.getElementById('tp1').addEventListener('click', () => togglePass('password', 'tp1'))
    document.getElementById('tp2').addEventListener('click', () => togglePass('confirm', 'tp2'))

    // استخراج session من الرابط
    async function init() {
      const { data: { session }, error } = await supabase.auth.getSession()
      if (!session) {
        // محاولة استخراج التوكن من الهاش
        const hash = window.location.hash
        if (hash && hash.includes('access_token')) {
          const params = new URLSearchParams(hash.replace('#', ''))
          const access_token = params.get('access_token')
          const refresh_token = params.get('refresh_token')
          if (access_token) {
            await supabase.auth.setSession({ access_token, refresh_token })
          }
        } else {
          document.getElementById('formSection').innerHTML = `
            <div class="error-state">
              <p>⚠️ الرابط غير صالح أو انتهت صلاحيته</p>
              <a href="forgot-password.html">← طلب رابط جديد</a>
            </div>`
        }
      }
    }

    document.getElementById('resetBtn').addEventListener('click', async function() {
      const password = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value
      const msg = document.getElementById('message')
      const passError = document.getElementById('passError')
      const confirmError = document.getElementById('confirmError')

      passError.style.display = 'none'
      confirmError.style.display = 'none'
      msg.style.display = 'none'

      let valid = true
      if (!password || !/^(?=.*[a-zA-Z])(?=.*\d).{8,}$/.test(password)) {
        passError.style.display = 'block'
        passError.textContent = '⚠️ كلمة المرور يجب أن تحتوي على حروف وأرقام وتكون 8 أحرف على الأقل'
        valid = false
      }
      if (password !== confirm) {
        confirmError.style.display = 'block'
        confirmError.textContent = '⚠️ كلمة المرور وتأكيدها غير متطابقتين'
        valid = false
      }
      if (!valid) return

      this.disabled = true
      this.innerText = 'جاري الحفظ...'

      const { error } = await supabase.auth.updateUser({ password })

      this.disabled = false
      this.innerText = 'حفظ كلمة المرور الجديدة'

      if (error) {
        msg.style.display = 'block'; msg.className = 'message error'
        msg.innerText = '❌ حدث خطأ: ' + error.message
      } else {
        msg.style.display = 'block'; msg.className = 'message success'
        msg.innerText = '✅ تم تغيير كلمة المرور بنجاح!'
        setTimeout(() => window.location.href = 'login.html', 2500)
      }
    })

    init()
  </script>
</body>
</html>
