<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - نسيت كلمة المرور</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
    .bg-c { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
    .c1 { width: 500px; height: 500px; background: #1a6fd4; top: -150px; left: -150px; }
    .c2 { width: 350px; height: 350px; background: #4db8ff; bottom: -100px; right: -100px; }
    nav { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 20px; font-weight: 800; color: white; }
    .logo-text span { color: #4db8ff; }
    .container { position: relative; z-index: 5; flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: rgba(13,31,60,0.85); backdrop-filter: blur(30px); border-radius: 24px; padding: 45px 40px; width: 100%; max-width: 440px; border: 1px solid rgba(77,184,255,0.15); box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
    .card-header { text-align: center; margin-bottom: 35px; }
    .card-icon { width: 75px; height: 75px; background: linear-gradient(135deg, rgba(26,111,212,0.4), rgba(77,184,255,0.3)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 34px; margin: 0 auto 20px; border: 1px solid rgba(77,184,255,0.3); }
    .card-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .card-header p { color: #7a9abf; font-size: 14px; line-height: 1.6; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #aac4e0; }
    .form-group input { width: 100%; padding: 13px 16px; background: rgba(10,25,50,0.6); border: 1.5px solid rgba(77,184,255,0.1); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: all 0.3s; }
    .form-group input:focus { border-color: #1a6fd4; }
    .form-group input::placeholder { color: #2d4a6a; }
    .field-error { font-size: 12px; color: #ff8080; margin-top: 6px; display: none; background: rgba(255,50,50,0.08); border: 1px solid rgba(255,50,50,0.2); padding: 7px 10px; border-radius: 8px; }
    .btn-send { width: 100%; padding: 15px; background: linear-gradient(135deg, #1a6fd4, #1558a8); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(26,111,212,0.3); }
    .btn-send:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-send:disabled { opacity: 0.6; cursor: not-allowed; }
    .countdown { text-align: center; margin-top: 12px; font-size: 13px; color: #7a9abf; display: none; }
    .back-link { text-align: center; margin-top: 20px; font-size: 14px; color: #7a9abf; }
    .back-link a { color: #4db8ff; text-decoration: none; font-weight: 600; }
    .message { padding: 13px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: none; line-height: 1.5; }
    .message.error { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff8080; }
    .message.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #50c864; }
    footer { position: relative; z-index: 5; background: rgba(5,13,26,0.8); padding: 18px; text-align: center; color: #3d5a7a; font-size: 13px; }
  </style>
</head>
<body>
  <div class="bg"><div class="bg-c c1"></div><div class="bg-c c2"></div></div>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Fix<span>NEURO</span></div>
    </a>
    <a href="login.html" style="color:#4db8ff;text-decoration:none;font-size:14px;font-weight:600;">تسجيل الدخول</a>
  </nav>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">🔐</div>
        <h2>نسيت كلمة المرور؟</h2>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
      </div>
      <div class="message" id="message"></div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" />
        <div class="field-error" id="emailError"></div>
      </div>
      <button class="btn-send" id="sendBtn">إرسال رابط إعادة التعيين</button>
      <div class="countdown" id="countdown"></div>
      <div class="back-link"><a href="login.html">← الرجوع لتسجيل الدخول</a></div>
    </div>
  </div>
  <footer><p>©️ 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p></footer>
  <script type="module">
    import { supabase } from './database.js'
    let timer = null
    const SITE = 'https://admirable-selkie-acd9d0.netlify.app'

    function fmt(s) {
      if (s >= 60) { const m = Math.floor(s/60), r = s%60; return r ? `${m} دقيقة و ${r} ثانية` : `${m} دقيقة` }
      return `${s} ثانية`
    }

    function startTimer(seconds, labelFn) {
      const btn = document.getElementById('sendBtn')
      const cd = document.getElementById('countdown')
      btn.disabled = true; cd.style.display = 'block'
      let rem = seconds
      cd.innerText = labelFn(rem)
      if (timer) clearInterval(timer)
      timer = setInterval(() => {
        rem--
        if (rem <= 0) {
          clearInterval(timer)
          btn.disabled = false
          btn.innerText = 'إرسال رابط إعادة التعيين'
          cd.style.display = 'none'
          localStorage.removeItem('fp_t')
          localStorage.removeItem('fp_type')
        } else { cd.innerText = labelFn(rem) }
      }, 1000)
    }

    // تحقق من cooldown محفوظ
    try {
      const last = localStorage.getItem('fp_t')
      const type = localStorage.getItem('fp_type')
      if (last) {
        const elapsed = Math.floor((Date.now() - parseInt(last)) / 1000)
        const total = type === 'rate' ? 600 : 60
        const rem = total - elapsed
        if (rem > 0) {
          const msg = document.getElementById('message')
          msg.style.display = 'block'
          if (type === 'rate') {
            msg.className = 'message error'
            msg.innerText = '⚠️ تم إرسال طلبات كثيرة، حاول بعد قليل'
            startTimer(rem, s => `يمكنك المحاولة بعد ${fmt(s)}`)
          } else {
            msg.className = 'message success'
            msg.innerText = '✅ تم إرسال الرابط، تحقق من بريدك'
            startTimer(rem, s => `يمكنك إعادة الإرسال بعد ${fmt(s)}`)
          }
        } else {
          localStorage.removeItem('fp_t')
          localStorage.removeItem('fp_type')
        }
      }
    } catch(e) {}

    document.getElementById('sendBtn').addEventListener('click', async function() {
      const email = document.getElementById('email').value.trim()
      const msg = document.getElementById('message')
      const err = document.getElementById('emailError')
      err.style.display = 'none'; msg.style.display = 'none'

      if (!email) { err.style.display = 'block'; err.innerText = '⚠️ يرجى إدخال البريد الإلكتروني'; return }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.style.display = 'block'; err.innerText = '⚠️ صيغة البريد غير صحيحة'; return }

      this.disabled = true; this.innerText = 'جاري الإرسال...'

      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: `${SITE}/reset-password.html`
        })
        if (error) {
          const isRate = error.message.toLowerCase().includes('rate limit') || error.status === 429
          msg.style.display = 'block'; msg.className = 'message error'
          if (isRate) {
            msg.innerText = '⚠️ تم إرسال طلبات كثيرة، حاول بعد 10 دقائق'
            localStorage.setItem('fp_t', Date.now()); localStorage.setItem('fp_type', 'rate')
            startTimer(600, s => `يمكنك المحاولة بعد ${fmt(s)}`)
          } else {
            msg.innerText = '❌ حدث خطأ، تأكد من البريد وحاول مرة أخرى'
            this.disabled = false; this.innerText = 'إرسال رابط إعادة التعيين'
          }
        } else {
          msg.style.display = 'block'; msg.className = 'message success'
          msg.innerText = '✅ تم إرسال الرابط إلى بريدك الإلكتروني'
          localStorage.setItem('fp_t', Date.now()); localStorage.setItem('fp_type', 'success')
          startTimer(60, s => `يمكنك إعادة الإرسال بعد ${fmt(s)}`)
        }
      } catch(e) {
        msg.style.display = 'block'; msg.className = 'message error'
        msg.innerText = '❌ خطأ في الاتصال، تأكد من الإنترنت'
        this.disabled = false; this.innerText = 'إرسال رابط إعادة التعيين'
      }
    })
  </script>
</body>
</html>
