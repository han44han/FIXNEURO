<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - سيارتي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; color: white; }
    .logo-text span { color: #4db8ff; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-links a { color: #aac4e0; text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #4db8ff; }
    .container { flex: 1; padding: 40px 20px; max-width: 700px; margin: 0 auto; width: 100%; }
    .page-header { margin-bottom: 35px; }
    .page-header h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-header p { color: #7a9abf; font-size: 15px; }
    .cars-section { margin-bottom: 30px; }
    .cars-section h3 { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #aac4e0; }
    .car-card { background: rgba(13,31,60,0.7); border-radius: 16px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(77,184,255,0.1); display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
    .car-card:hover { border-color: rgba(77,184,255,0.3); }
    .car-info h4 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .car-info p { color: #7a9abf; font-size: 13px; }
    .car-badge { background: rgba(26,111,212,0.2); border: 1px solid rgba(77,184,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: #4db8ff; }
    .form-card { background: rgba(13,31,60,0.7); border-radius: 22px; padding: 35px; border: 1px solid rgba(77,184,255,0.1); }
    .form-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 9px; color: #aac4e0; }
    .form-group input, .form-group select { width: 100%; padding: 13px 16px; background: rgba(10,25,50,0.6); border: 1.5px solid rgba(77,184,255,0.1); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: all 0.3s; }
    .form-group select option { background: #0d1f3c; }
    .form-group input:focus, .form-group select:focus { border-color: #1a6fd4; background: rgba(10,25,50,0.9); }
    .form-group input::placeholder { color: #2d4a6a; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .fuel-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fuel-btn { padding: 13px; background: rgba(10,25,50,0.6); border: 1.5px solid rgba(77,184,255,0.1); border-radius: 12px; color: #7a9abf; cursor: pointer; text-align: center; font-size: 14px; font-weight: 500; transition: all 0.3s; }
    .fuel-btn.active { border-color: #1a6fd4; background: rgba(26,111,212,0.2); color: #4db8ff; }
    .fuel-btn:hover { border-color: #1a6fd4; color: #4db8ff; }
    .btn-save { width: 100%; padding: 16px; background: linear-gradient(135deg, #1a6fd4, #1558a8); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.3s; box-shadow: 0 8px 25px rgba(26,111,212,0.3); }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(26,111,212,0.5); }
    .message { padding: 13px 16px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 14px; display: none; }
    .message.error { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff8080; }
    .message.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.3); color: #50c864; }
    .empty-state { text-align: center; padding: 30px; color: #7a9abf; }
    footer { background: rgba(5,13,26,0.9); padding: 18px; text-align: center; color: #3d5a7a; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Fix<span>NEURO</span></div>
    </a>
    <div class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="dia.html">تشخيص</a>
      <a href="map.html">الورش</a>
      <a href="reports.html">التقارير</a>
    </div>
  </nav>
  <div class="container">
    <div class="page-header">
      <h2>🚗 سياراتي</h2>
      <p>أضف وأدر بيانات سياراتك المسجلة</p>
    </div>
    <div class="message" id="message"></div>
    <div class="cars-section" id="carsSection" style="display:none;">
      <h3>سياراتك المسجلة</h3>
      <div id="carsList"></div>
    </div>
    <div class="form-card">
      <h3>➕ إضافة سيارة جديدة</h3>
      <div class="form-group">
        <label>الماركة</label>
        <select id="brand">
          <option value="">اختر الماركة</option>
          <option>تويوتا</option><option>هوندا</option><option>نيسان</option>
          <option>هيونداي</option><option>كيا</option><option>فورد</option>
          <option>شيفروليه</option><option>BMW</option><option>مرسيدس</option>
          <option>أودي</option><option>لكزس</option><option>إنفينيتي</option>
          <option>جيب</option><option>لاند روفر</option><option>فولكس واجن</option>
          <option>بورشه</option><option>مازدا</option><option>سوبارو</option>
          <option>ميتسوبيشي</option><option>شيري</option><option>MG</option>
        </select>
      </div>
      <div class="form-group">
        <label>الموديل</label>
        <input type="text" id="model" placeholder="مثال: كامري، باترول، كورولا" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>سنة الصنع</label>
          <input type="number" id="year" placeholder="2020" min="1990" max="2025" />
        </div>
        <div class="form-group">
          <label>رقم اللوحة</label>
          <input type="text" id="plate" placeholder="أ ب ج 1234" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>اللون</label>
          <input type="text" id="color" placeholder="مثال: أبيض، أسود" />
        </div>
        <div class="form-group">
          <label>عداد الكيلومترات</label>
          <input type="number" id="mileage" placeholder="50000" />
        </div>
      </div>
      <div class="form-group">
        <label>نوع الوقود</label>
        <div class="fuel-options">
          <div class="fuel-btn active" onclick="selectFuel(this,'بنزين')">⛽ بنزين</div>
          <div class="fuel-btn" onclick="selectFuel(this,'ديزل')">🛢️ ديزل</div>
          <div class="fuel-btn" onclick="selectFuel(this,'كهربائي')">⚡ كهربائي</div>
          <div class="fuel-btn" onclick="selectFuel(this,'هجين')">🔋 هجين</div>
        </div>
      </div>
      <button class="btn-save" id="saveBtn">💾 حفظ السيارة</button>
    </div>
  </div>
  <footer><p>© 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p></footer>
  <script type="module">
    import { supabase } from './database.js'
    let selectedFuel = 'بنزين'
    let currentUser = null

    window.selectFuel = function(el, fuel) {
      document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'))
      el.classList.add('active')
      selectedFuel = fuel
    }

    async function loadCars() {
      const { data: cars } = await supabase.from('cars').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
      const section = document.getElementById('carsSection')
      const list = document.getElementById('carsList')
      if (!cars || cars.length === 0) { section.style.display = 'none'; return }
      section.style.display = 'block'
      list.innerHTML = cars.map(c => `
        <div class="car-card">
          <div class="car-info">
            <h4>🚗 ${c.brand} ${c.model} ${c.year || ''}</h4>
            <p>${c.plate_number ? c.plate_number + ' • ' : ''}${c.fuel_type || ''} ${c.color ? '• ' + c.color : ''} ${c.mileage ? '• ' + c.mileage.toLocaleString() + ' كم' : ''}</p>
          </div>
          <span class="car-badge">${c.fuel_type || 'بنزين'}</span>
        </div>`).join('')
    }

    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'login.html'; return }
      currentUser = session.user
      await loadCars()
    }

    document.getElementById('saveBtn').addEventListener('click', async function() {
      const msg = document.getElementById('message')
      const brand = document.getElementById('brand').value
      const model = document.getElementById('model').value.trim()
      const year = document.getElementById('year').value

      if (!brand || !model || !year) {
        msg.style.display = 'block'; msg.className = 'message error'
        msg.innerText = '⚠️ يرجى تعبئة الماركة والموديل وسنة الصنع'
        return
      }

      this.disabled = true; this.innerText = 'جاري الحفظ...'

      const { error } = await supabase.from('cars').insert({
        user_id: currentUser.id, brand, model,
        year: parseInt(year),
        plate_number: document.getElementById('plate').value.trim(),
        color: document.getElementById('color').value.trim(),
        mileage: document.getElementById('mileage').value ? parseInt(document.getElementById('mileage').value) : null,
        fuel_type: selectedFuel
      })

      this.disabled = false; this.innerText = '💾 حفظ السيارة'

      if (error) {
        msg.style.display = 'block'; msg.className = 'message error'
        msg.innerText = '❌ حدث خطأ في الحفظ'
      } else {
        msg.style.display = 'block'; msg.className = 'message success'
        msg.innerText = '✅ تم حفظ السيارة بنجاح!'
        document.getElementById('brand').value = ''
        document.getElementById('model').value = ''
        document.getElementById('year').value = ''
        document.getElementById('plate').value = ''
        document.getElementById('color').value = ''
        document.getElementById('mileage').value = ''
        await loadCars()
        setTimeout(() => { msg.style.display = 'none' }, 3000)
      }
    })

    init()
  </script>
</body>
</html>
