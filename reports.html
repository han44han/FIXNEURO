<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - التقارير</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; color: white; }
    .logo-text span { color: #4db8ff; }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: #aac4e0; text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #4db8ff; }
    .container { flex: 1; padding: 40px 20px; max-width: 850px; margin: 0 auto; width: 100%; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .page-header h2 { font-size: 28px; font-weight: 700; }
    .page-header p { color: #7a9abf; font-size: 14px; margin-top: 5px; }
    .btn-new { background: linear-gradient(135deg, #1a6fd4, #1558a8); color: white; padding: 11px 22px; border-radius: 12px; text-decoration: none; font-size: 14px; font-weight: 700; transition: all 0.3s; }
    .btn-new:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(26,111,212,0.4); }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .stat-card { background: rgba(13,31,60,0.7); border-radius: 18px; padding: 22px; text-align: center; border: 1px solid rgba(77,184,255,0.08); }
    .stat-icon { font-size: 28px; margin-bottom: 10px; }
    .stat-num { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #4db8ff, #1a6fd4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { color: #7a9abf; font-size: 13px; margin-top: 5px; }
    .report-card { background: rgba(13,31,60,0.7); border-radius: 18px; padding: 22px; margin-bottom: 15px; border: 1px solid rgba(77,184,255,0.08); transition: border-color 0.3s; }
    .report-card:hover { border-color: rgba(77,184,255,0.2); }
    .report-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .report-title { font-size: 16px; font-weight: 700; }
    .report-date { color: #7a9abf; font-size: 12px; margin-top: 4px; }
    .severity { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .severity.pending { background: rgba(255,165,0,0.15); color: #ffa500; border: 1px solid rgba(255,165,0,0.3); }
    .severity.completed { background: rgba(50,200,100,0.15); color: #50c864; border: 1px solid rgba(50,200,100,0.3); }
    .report-desc { color: #7a9abf; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
    .report-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
    .cost { color: #f5a623; font-size: 15px; font-weight: 700; }
    .btn-workshop { padding: 9px 20px; background: rgba(26,111,212,0.2); color: #4db8ff; border: 1px solid rgba(77,184,255,0.3); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; }
    .btn-workshop:hover { background: #1a6fd4; color: white; }
    .empty { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 70px; margin-bottom: 20px; opacity: 0.4; }
    .empty h3 { font-size: 22px; font-weight: 700; color: #aac4e0; margin-bottom: 10px; }
    .empty p { font-size: 14px; color: #7a9abf; margin-bottom: 25px; }
    .btn-start { display: inline-block; padding: 13px 35px; background: linear-gradient(135deg, #1a6fd4, #1558a8); color: white; border-radius: 12px; text-decoration: none; font-size: 15px; font-weight: 700; }
    footer { background: rgba(5,13,26,0.9); padding: 18px; text-align: center; color: #3d5a7a; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Fix<span>NEURO</span></div>
    </a>
    <div class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="dia.html">تشخيص</a>
      <a href="map.html">الورش</a>
      <a href="car.html">سيارتي</a>
    </div>
  </nav>
  <div class="container">
    <div class="page-header">
      <div>
        <h2>📋 تقاريري</h2>
        <p>سجل كامل لجميع تشخيصات سيارتك</p>
      </div>
      <a href="dia.html" class="btn-new">+ تشخيص جديد</a>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-num" id="totalNum">0</div><div class="stat-label">إجمالي التقارير</div></div>
      <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-num" id="pendingNum">0</div><div class="stat-label">قيد الانتظار</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-num" id="resolvedNum">0</div><div class="stat-label">تم حلها</div></div>
    </div>
    <div id="reportsList"></div>
  </div>
  <footer><p>© 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p></footer>
  <script type="module">
    import { supabase } from './database.js'
    async function loadReports() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'login.html'; return }
      const { data, error } = await supabase.from('maintenance_reports').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false })
      const reports = error || !data ? [] : data
      document.getElementById('totalNum').innerText = reports.length
      document.getElementById('pendingNum').innerText = reports.filter(r => r.status === 'pending').length
      document.getElementById('resolvedNum').innerText = reports.filter(r => r.status === 'completed').length
      const list = document.getElementById('reportsList')
      if (reports.length === 0) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>لا توجد تقارير بعد</h3><p>ابدأ بتشخيص سيارتك للحصول على تقارير مفصلة</p><a href="dia.html" class="btn-start">🔍 ابدأ أول تشخيص</a></div>`
        return
      }
      list.innerHTML = reports.map(r => `
        <div class="report-card">
          <div class="report-header">
            <div><div class="report-title">${r.title}</div><div class="report-date">📅 ${new Date(r.created_at).toLocaleDateString('ar-SA')}</div></div>
            <span class="severity ${r.status}">${r.status === 'completed' ? '✅ مكتمل' : '⏳ قيد الانتظار'}</span>
          </div>
          <div class="report-desc">📝 ${r.description || 'لا يوجد وصف'}</div>
          <div class="report-footer">
            <div class="cost">💰 ${r.cost ? r.cost.toLocaleString() + ' ريال' : 'غير محدد'}</div>
            <a href="map.html" class="btn-workshop">📍 ابحث عن ورشة</a>
          </div>
        </div>`).join('')
    }
    loadReports()
  </script>
</body>
</html>
