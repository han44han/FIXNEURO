<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشخيص أضرار المركبة | AI Analysis</title>
    
    <!-- 1. استدعاء مكتبة TensorFlow.js (ضروري جداً قبل ai.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #161b22;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
        }

        h2 {
            text-align: center;
            color: #58a6ff;
            margin-bottom: 25px;
        }

        .upload-section {
            border: 2px dashed #30363d;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .upload-section:hover {
            border-color: #58a6ff;
            background: #1c2128;
        }

        input[type="file"] {
            display: none;
        }

        .main-btn {
            width: 100%;
            background: #238636;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .main-btn:disabled {
            background: #216e39;
            opacity: 0.6;
            cursor: not-allowed;
        }

        #resultItems {
            margin-top: 20px;
        }

        .preview-img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔍 فحص الذكاء الاصطناعي</h2>

        <div class="upload-section" onclick="document.getElementById('carImage').click()">
            <p>اضغط لرفع صورة الحادث</p>
            <small style="color: #8b949e;">يدعم PNG, JPG (Mask R-CNN Ready)</small>
            <input type="file" id="carImage" accept="image/*" onchange="previewImage(this)">
            <img id="imgPreview" class="preview-img" alt="معاينة الصورة">
        </div>

        <button id="mainBtn" class="main-btn" onclick="startAnalysis()">🔍 شخّص المشكلة الآن</button>

        <div id="resultItems">
            <!-- النتائج ستظهر هنا عبر ملف ai.js -->
        </div>
    </div>

    <!-- 2. استدعاء ملف البرمجة الخاص بك كـ Module -->
    <script type="module" src="ai.js"></script>

    <script>
        // دالة بسيطة لمعاينة الصورة قبل التحليل
        function previewImage(input) {
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
