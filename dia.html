<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - تشخيص السيارة</title>
  <style>
    /* التنسيقات الأصلية لموقعك لضمان ثبات الشكل */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a1628; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #0d1f3c; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo span { font-size: 22px; font-weight: bold; }
    .logo span em { color: #4db8ff; font-style: normal; }
    .logo-icon { background: #1a6fd4; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .container { flex: 1; padding: 40px 20px; max-width: 800px; margin: 0 auto; width: 100%; }
    .card { background: #0d1f3c; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h2 { margin-bottom: 25px; text-align: center; font-size: 24px; }
    
    /* تنسيقات منطقة الرفع والنتيجة */
    .upload-area { border: 2px dashed #1a6fd4; border-radius: 15px; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
    .upload-area:hover { background: rgba(26, 111, 212, 0.1); }
    .btn-primary { background: #1a6fd4; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; transition: 0.3s; }
    .btn-primary:hover { background: #155bb5; }
    .loading { display: none; text-align: center; margin: 20px 0; color: #4db8ff; }
    #imagePreview { max-width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
    #resultItems { margin-top: 25px; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <span>Fix<em>Neuro</em></span>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>تشخيص الحادث بالذكاء الاصطناعي</h2>
      
      <div class="upload-area" onclick="document.getElementById('imageInput').click()">
        <p id="uploadText">اضغط هنا لرفع صورة السيارة المصدومة</p>
        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage()">
        <img id="imagePreview" src="" alt="معاينة الصورة">
      </div>

      <button id="runBtn" class="btn-primary" onclick="analyzeImage()">ابدأ الفحص الفوري</button>

      <div id="loading" class="loading">⏳ جاري تحليل الأضرار، يرجى الانتظار...</div>

      <div id="resultItems">
        </div>
    </div>
  </div>

  <script type="module">
    import { analyzeImage } from './ai.js';
    // جعل الدالة متاحة للزر في الـ HTML
    window.analyzeImage = analyzeImage;
  </script>

  <script>
    // وظيفة المعاينة السريعة للصورة
    function previewImage() {
      const file = document.getElementById('imageInput').files[0];
      const preview = document.getElementById('imagePreview');
      const text = document.getElementById('uploadText');
      
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
          text.style.display = 'none';
        }
        reader.readAsDataURL(file);
      }
    }
  </script>

</body>
</html>
