<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - التشخيص الذكي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: bold; color: white; }
    .container { flex: 1; max-width: 800px; margin: 40px auto; padding: 0 20px; width: 100%; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; backdrop-filter: blur(10px); }
    h1 { font-size: 28px; margin-bottom: 10px; text-align: center; background: linear-gradient(to right, #fff, #4db8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.subtitle { text-align: center; color: #a0a0a0; margin-bottom: 30px; }
    
    .tabs-container { display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 5px; margin-bottom: 25px; border: 1px solid rgba(77,184,255,0.1); }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
    .tab-btn.active { background: linear-gradient(135deg, #1a6fd4, #4db8ff); color: #000; }

    .input-group { margin-bottom: 25px; }
    label { display: block; margin-bottom: 10px; color: #4db8ff; font-weight: 500; }
    
    select, textarea, input[type="file"] { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(77,184,255,0.2); border-radius: 15px; padding: 15px; color: white; font-size: 16px; outline: none; }
    textarea { min-height: 120px; resize: vertical; }

    .btn-action { width: 100%; border: none; border-radius: 15px; padding: 18px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; color: white; }
    .btn-text { background: linear-gradient(135deg, #1a6fd4, #4db8ff); }
    .btn-image { background: linear-gradient(135deg, #ffc107, #ff9800); color: #000; }
    .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }

    #result-box { margin-top: 30px; padding: 20px; border: 1px solid #ffc107; border-radius: 20px; background: rgba(255,193,7,0.05); display: none; }
    #res-img { width: 100%; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">⚙️</div>
    <span class="logo-text">FixNeuro</span>
  </a>
</nav>

<div class="container">
  <div class="card">
    <h1>التشخيص الذكي</h1>
    <p class="subtitle">اختر الطريقة المناسبة لفحص مركبتك</p>

    <div class="tabs-container">
      <button class="tab-btn active" id="btnText" onclick="switchMode('text')">تشخيص نصي</button>
      <button class="tab-btn" id="btnImage" onclick="switchMode('image')">تشخيص بالصورة</button>
    </div>

    <!-- مسار النص -->
    <div id="textSection">
      <div class="input-group">
        <label>فئة السيارة:</label>
        <select id="carCategory">
          <option value="1">اقتصادية</option>
          <option value="1.6">متوسطة / عائلية</option>
          <option value="2.8">فاخرة</option>
        </select>
      </div>
      <div class="input-group">
        <label>وصف المشكلة:</label>
        <textarea id="text-input" placeholder="مثال: أسمع صوت طقطقة في المساعدات عند المنعطفات..."></textarea>
      </div>
      <button class="btn-action btn-text" onclick="diagnoseText()">شخّص النص الآن ✍️</button>
    </div>

    <!-- مسار الصورة -->
    <div id="imageSection" style="display: none;">
      <div class="input-group">
        <label>ارفع صورة واضحة لمكان الضرر:</label>
        <input type="file" id="image-input" accept="image/*">
      </div>
      <button class="btn-action btn-image" onclick="diagnoseImage()">شخّص الصورة الآن 📷</button>
    </div>

    <!-- منطقة عرض النتائج الموحدة -->
    <div id="result-box">
        <h3 style="color: #ffc107; margin-bottom: 15px; text-align: center;">🔍 نتيجة التحليل</h3>
        <img id="res-img" src="" style="display:none;">
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px;">
            <p><strong>التشخيص المبدئي:</strong> <span id="res-text" style="color: #ccc;">--</span></p>
        </div>
    </div>
  </div>
</div>

<script>
    // دالة التبديل بين الأقسام
    function switchMode(mode) {
        const textSection = document.getElementById('textSection');
        const imageSection = document.getElementById('imageSection');
        const btnText = document.getElementById('btnText');
        const btnImage = document.getElementById('btnImage');
        const resultBox = document.getElementById('result-box');

        // إخفاء النتيجة عند التبديل
        resultBox.style.display = 'none';

        if (mode === 'text') {
            textSection.style.display = 'block';
            imageSection.style.display = 'none';
            btnText.classList.add('active');
            btnImage.classList.remove('active');
        } else {
            textSection.style.display = 'none';
            imageSection.style.display = 'block';
            btnImage.classList.add('active');
            btnText.classList.remove('active');
        }
    }
</script>

<!-- ربط ملفات الجافاسكريبت الخارجية -->
<script type="module">
    import { diagnoseText, diagnoseImage } from './ai.js';
    window.diagnoseText = diagnoseText;
    window.diagnoseImage = diagnoseImage;
</script>

</body>
</html>
