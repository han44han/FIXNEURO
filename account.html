<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixNeuro - حسابي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #050d1a; color: white; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 30px; background: rgba(5,13,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(77,184,255,0.1); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; color: white; }
    .logo-text span { color: #4db8ff; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-links a { color: #aac4e0; text-decoration: none; font-size: 14px; }
    .nav-links a:hover { color: #4db8ff; }
    .container { flex: 1; padding: 50px 20px; max-width: 650px; margin: 0 auto; width: 100%; }
    .page-header { margin-bottom: 35px; }
    .page-header h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-header p { color: #7a9abf; font-size: 15px; }
    .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 35px; }
    .avatar { width: 100px; height: 100px; background: linear-gradient(135deg, #1a6fd4, #4db8ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; box-shadow: 0 10px 35px rgba(26,111,212,0.4); margin-bottom: 15px; }
    .avatar-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .avatar-badge { background: rgba(26,111,212,0.2); border: 1px solid rgba(77,184,255,0.3); padding: 5px 16px; border-radius: 20px; font-size: 13px; color: #4db8ff; }
    .info-card { background: rgba(13,31,60,0.7); border-radius: 22px; padding: 30px; border: 1px solid rgba(77,184,255,0.1); margin-bottom: 20px; }
    .info-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.06); color: #aac4e0; }
    .info-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .info-row:last-child { border-bottom: none; }
    .info-label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #7a9abf; }
    .info-value { font-size: 15px; font-weight: 600; color: white; }
    .actions-card { background: rgba(13,31,60,0.7); border-radius: 22px; padding: 25px; border: 1px solid rgba(77,184,255,0.1); }
    .action-btn { width: 100%; padding: 14px 20px; background: none; border: 1px solid rgba(77,184,255,0.15); border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; text-align: right; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; transition: all 0.3s; text-decoration: none; }
    .action-btn:hover { border-color: rgba(77,184,255,0.4); background: rgba(26,111,212,0.1); }
    .action-btn:last-child { margin-bottom: 0; }
    .action-btn.danger { border-color: rgba(255,100,100,0.2); color: #ff8080; }
    .action-btn.danger:hover { border-color: rgba(255,100,100,0.4); background: rgba(255,100,100,0.08); }
    footer { background: rgba(5,13,26,0.9); padding: 18px; text-align: center; color: #3d5a7a; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-text">Fix<span>NEURO</span></div>
    </a>
    <div class="nav-links">
      <a href="account.html">👤 حسابي</a>
      <a href="dia.html">🔍 تشخيص</a>
      <a href="map.html">📍 الورش</a>
      <a href="reports.html">📋 التقارير</a>
      <a href="#" id="logoutBtn" style="color:#ff6b6b; font-weight:600;">خروج</a>
    </div>
  </nav>
  <div class="container">
    <div class="page-header">
      <h2>👤 حسابي</h2>
      <p>معلومات حسابك الشخصي</p>
    </div>
    <div class="avatar-section">
      <div class="avatar">👤</div>
      <div class="avatar-name" id="avatarName">...</div>
      <div class="avatar-badge">مستخدم نشط ✓</div>
    </div>
    <div class="info-card">
      <h3>📋 البيانات الشخصية</h3>
      <div class="info-row">
        <div class="info-label">👤 الاسم الكامل</div>
        <div class="info-value" id="infoName">...</div>
      </div>
      <div class="info-row">
        <div class="info-label">📧 البريد الإلكتروني</div>
        <div class="info-value" id="infoEmail">...</div>
      </div>
      <div class="info-row">
        <div class="info-label">📅 تاريخ التسجيل</div>
        <div class="info-value" id="infoDate">...</div>
      </div>
    </div>
    <div class="actions-card">
      <a href="forgot-password.html" class="action-btn">🔑 تغيير كلمة المرور</a>
      <a href="#" class="action-btn danger" id="logoutBtn2">🚪 تسجيل الخروج</a>
    </div>
  </div>
  <footer><p>©️ 2025 FixNeuro - Car Doctor. جميع الحقوق محفوظة</p></footer>

  <script type="module">
    import { supabase } from './database.js'

    async function init() {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) { window.location.href = 'login.html'; return }

      const user = session.user
      document.getElementById('infoEmail').innerText = user.email || '—'
      document.getElementById('infoDate').innerText = new Date(user.created_at).toLocaleDateString('ar-SA')

      const { data: profile } = await supabase
        .from('profiles')
        .select('full_name')
        .eq('id', user.id)
        .single()

      if (profile?.full_name) {
        document.getElementById('avatarName').innerText = profile.full_name
        document.getElementById('infoName').innerText = profile.full_name
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'splash.html'
    })

    document.getElementById('logoutBtn2').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'splash.html'
    })

    init()
  </script>
</body>
</html>
